<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2d2d3a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 48px;
            width: 90%;
            max-width: 640px;
        }

        .brand-logo {
            width: 800px;
            height: auto;
            max-width: 90vw;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        .search-wrapper {
            width: 100%;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 52px 18px 24px;
            border: 2px solid #5a5a6e;
            border-radius: 10px;
            background: #252532;
            color: #e0e0e8;
            font-size: 17px;
            outline: none;
            transition: all 0.25s ease;
        }

        .search-input::placeholder {
            color: #7a7a8e;
        }

        .search-input:focus {
            border-color: #ff7139;
            background: #2a2a38;
            box-shadow: 0 0 0 3px rgba(255, 113, 57, 0.15);
        }

        .search-btn {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #7a7a8e;
            cursor: pointer;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .search-btn:hover {
            color: #ff7139;
            background: rgba(255, 113, 57, 0.1);
        }

        .search-btn:active {
            transform: translateY(-50%) scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="lvk5ca.png" alt="Firefox" class="brand-logo">
        
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInput" placeholder="Type to search" autofocus>
            <button class="search-btn" id="searchBtn" aria-label="Search">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');

        function performSearch() {
            const query = searchInput.value.trim();
            if (query) {
                // Using Google search - change URL if you prefer DuckDuckGo, Bing, etc.
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            }
        }

        // Search on Enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // Search on button click
        searchBtn.addEventListener('click', performSearch);
    </script>
</body>
</html>
